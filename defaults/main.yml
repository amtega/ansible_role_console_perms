---
# Role default lower priority variables

# Warning! Write permissions as strings:
#   '0660' without "'" will be interpreted as octal and converted to 432

console_perms:
  - path: /etc/security/console.perms
    classes:
      - name: console
        files:
          - 'tty[0-9][0-9]*'
          - 'vc/[0-9][0-9]*'
          - ':[0-9]+\.[0-9]+'
          - ':[0-9]+'
      - name: xconsole
        files:
          - ':[0-9]+\.[0-9]+'
          - ':[0-9]+'
